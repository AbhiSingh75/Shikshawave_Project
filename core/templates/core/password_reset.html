{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ShikshaWave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1976D2, #4CAF50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 20px 25px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #1976D2, #4CAF50);
            border-radius: 20px 20px 0 0;
        }
        .header { text-align: center; margin-bottom: 15px; }
        .logo { 
            width: 40px; 
            height: 40px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px; 
            cursor: pointer; 
            transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.1); }
        .title { 
            font-size: 1.5rem; 
            font-weight: 700; 
            margin-bottom: 2px;
            background: linear-gradient(135deg, #1976D2, #4CAF50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: #666; font-size: 0.85rem; }
        .form-group { margin-bottom: 12px; }
        .label { display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 0.9rem; }
        .input {
            width: 100%; padding: 10px 15px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 0.95rem; transition: all 0.3s ease;
            background: white;
        }
        .input:focus { outline: none; border-color: #1976D2; box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1); }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.3s ease;
            background: linear-gradient(135deg, #1976D2, #4CAF50);
            color: white; box-shadow: 0 4px 15px rgba(25, 118, 210, 0.3);
            margin-top: 5px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(25, 118, 210, 0.4); }
        .back-link { display: block; text-align: center; margin-top: 12px; color: #1976D2; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .back-link:hover { color: #4CAF50; }
        .alert { padding: 10px 12px; border-radius: 10px; margin-bottom: 15px; font-size: 0.85rem; }
        .alert-error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .alert-success { background: #e8f5e8; color: #2e7d32; border: 1px solid #c8e6c9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="{% static 'images/ShikshaWave_Logo.png' %}" alt="Logo" class="logo" onclick="window.location.href='/'">
            <h1 class="title">Forgot Password?</h1>
            <p class="subtitle">Enter your details to receive a reset OTP</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="label">Email, Username, or User Code</label>
                <input type="text" name="identifier" class="input" placeholder="e.g. john@example.com" required>
            </div>
            <button type="submit" class="btn">Send Reset OTP</button>
        </form>
        <a href="{% url 'login' %}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>

    <script>
        // --- UX ENHANCEMENT: AUTO-FILL USER ID ---
        // Read the 'uid' parameter from the URL and pre-fill the identifier field.
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const uid = urlParams.get('uid');
            const identifierInput = document.querySelector('input[name="identifier"]');
            
            if (uid && identifierInput) {
                identifierInput.value = decodeURIComponent(uid);
                // Optional: visual feedback
                identifierInput.style.borderColor = '#4CAF50';
                setTimeout(() => {
                    identifierInput.style.borderColor = '#e0e0e0';
                }, 2000);
            }
        });
    </script>
</body>
</html>
