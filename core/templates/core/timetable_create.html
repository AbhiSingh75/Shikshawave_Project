{% extends 'core/base_with_header.html' %}
{% load static %}

{% block title %}Timetable Management | ShikshaWave{% endblock %}

{% block extra_css %}
<style>
    :root {
        --primary-color: {{ primary_color|default:"#004aad" }};
        --primary-hover: {{ primary_hover|default:"#003a8c" }};
        --primary-light: {{ primary_light|default:"rgba(0, 74, 173, 0.1)" }};
        --border-color: #e5e7eb;
        --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --header-height: 80px;
    }

    body.dark-mode {
        --primary-color: {{ primary_color|default:"#6366f1" }};
        --primary-hover: {{ primary_hover|default:"#818cf8" }};
        --secondary-color: #1f2937;
        --text-color: #f9fafb;
        --text-light: #d1d5db;
        --light-gray: #374151;
        --border-color: #4b5563;
        --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
    }

    body {
        padding-top: calc(var(--header-height) + 20px);
        background-color: var(--secondary-color);
        overflow-x: hidden;
    }

    .dashboard-container {
        flex: 1;
        width: 100%;
        max-width: 100vw;
        display: flex;
        padding: 20px;
        flex-direction: column;
        overflow-x: hidden;
    }

    .page-header {
        margin-bottom: 30px;
        padding: 20px;
        background: white;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        border-left: 4px solid var(--primary-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    body.dark-mode .page-header {
        background: var(--secondary-color);
    }

    .page-header h3 {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--primary-color);
        margin: 0;
    }

    .control-tabs {
        display: flex;
        gap: 10px;
    }

    .tab-btn {
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        font-weight: 500;
        border: none;
        font-size: 0.95rem;
        background: var(--light-gray);
        color: var(--text-color);
    }

    .tab-btn.active {
        background: var(--primary-color);
        color: white;
    }

    .tab-btn:hover {
        transform: translateY(-2px);
    }

    .table-container {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: var(--card-shadow);
    }

    body.dark-mode .table-container {
        background: var(--secondary-color);
    }

    .table-header {
        display: grid;
        grid-template-columns: 2fr 1fr 2fr 2fr 120px;
        gap: 16px;
        padding: 16px 20px;
        background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
        color: white;
        font-weight: 600;
        font-size: 0.9rem;
    }

    .table-row {
        display: grid;
        grid-template-columns: 2fr 1fr 2fr 2fr 120px;
        gap: 16px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border-color);
        align-items: center;
        transition: background 0.2s;
    }

    .table-row:hover {
        background: var(--light-gray);
    }

    .table-row:last-child {
        border-bottom: none;
    }

    .table-actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
    }

    .action-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px 10px;
        border-radius: 6px;
        transition: all 0.2s;
        font-size: 0.95rem;
    }

    .edit-btn {
        color: #f59e0b;
    }

    .edit-btn:hover {
        background: rgba(245, 158, 11, 0.1);
    }

    .delete-btn {
        color: #ef4444;
    }

    .delete-btn:hover {
        background: rgba(239, 68, 68, 0.1);
    }

    .btn {
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        font-weight: 500;
        border: none;
        font-size: 0.95rem;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .btn-primary {
        background: var(--primary-color);
        color: white;
    }

    .btn-primary:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px var(--primary-light);
    }

    .btn-secondary {
        background: var(--light-gray);
        color: var(--text-color);
        border: 1px solid var(--border-color);
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        align-items: center;
        justify-content: center;
    }

    .modal.show {
        display: flex;
    }

    .modal-content {
        background: white;
        padding: 0;
        border-radius: 16px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        overflow: hidden;
    }

    body.dark-mode .modal-content {
        background: var(--secondary-color);
    }

    .modal-header {
        background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
        color: white;
        padding: 20px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-header h3 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 600;
    }

    .modal-close {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
    }

    .modal-close:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: rotate(90deg);
    }

    .modal-body {
        padding: 24px;
    }

    .form-group {
        margin-bottom: 16px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: var(--text-color);
        font-size: 0.9rem;
    }

    .form-group input,
    .form-group select {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid var(--border-color);
        border-radius: 8px;
        background: var(--light-gray);
        color: var(--text-color);
        transition: all 0.3s;
        font-size: 0.95rem;
    }

    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px var(--primary-light);
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .modal-footer {
        padding: 16px 24px;
        background: var(--light-gray);
        display: flex;
        gap: 10px;
        justify-content: flex-end;
    }

    body.dark-mode .modal-footer {
        background: rgba(0, 0, 0, 0.2);
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-light);
    }

    .empty-state i {
        font-size: 4rem;
        margin-bottom: 20px;
        opacity: 0.3;
    }

    .tab-content {
        display: none;
    }

    .tab-content.active {
        display: block;
    }

    @media (max-width: 768px) {
        .dashboard-container {
            padding: 15px;
            padding-top: 120px;
        }

        .page-header {
            flex-direction: column;
            gap: 15px;
            align-items: flex-start;
        }

        .page-header>div {
            width: 100%;
            flex-direction: column;
        }

        .control-tabs {
            width: 100%;
        }

        .tab-btn {
            flex: 1;
        }

        #addPeriodBtn,
        #addTimetableBtn {
            width: 100%;
        }

        .table-header {
            display: none;
        }

        .table-row {
            grid-template-columns: 1fr;
            gap: 10px;
            padding: 16px;
        }

        .form-row {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="page-header">
        <h3>📚 Timetable Management</h3>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div class="control-tabs">
                <button class="tab-btn active" onclick="switchTab('periods')">⏰ Period Setup</button>
                <button class="tab-btn" onclick="switchTab('timetables')">📋 Timetable Management</button>
            </div>
            <button id="addPeriodBtn" class="btn btn-primary" onclick="openPeriodModal()">
                <i class="fas fa-plus"></i> Add Period
            </button>
            <button id="addTimetableBtn" class="btn btn-primary" onclick="openTimetableModal()" style="display: none;">
                <i class="fas fa-plus"></i> Create Timetable
            </button>
        </div>
    </div>

    <div id="periodsTab" class="tab-content active">
        <div id="periodsList" class="table-container"></div>
    </div>

    <div id="timetablesTab" class="tab-content">
        <div id="timetablesList" class="table-container"></div>
    </div>
</div>

<div id="periodModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="periodModalTitle">Add Period</h3>
            <button type="button" class="modal-close" onclick="closePeriodModal()">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="period_id">
            <div class="form-group">
                <label>Period Name *</label>
                <input type="text" id="period_name" required>
            </div>
            <div class="form-group">
                <label>Period Type *</label>
                <select id="period_type">
                    <option value="Class">Class</option>
                    <option value="Break">Break</option>
                    <option value="Assembly">Assembly</option>
                    <option value="Activity">Activity</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Start Time *</label>
                    <input type="time" id="start_time" required>
                </div>
                <div class="form-group">
                    <label>End Time *</label>
                    <input type="time" id="end_time" required>
                </div>
            </div>
            <div class="form-group">
                <label>Display Order *</label>
                <input type="number" id="display_order" required>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closePeriodModal()">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="savePeriod()"><i class="fas fa-check"></i>
                Save</button>
        </div>
    </div>
</div>

<div id="timetableModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Create Timetable</h3>
            <button type="button" class="modal-close" onclick="closeTimetableModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Class *</label>
                <select id="class_id" required onchange="loadSections()"></select>
            </div>
            <div class="form-group">
                <label>Section</label>
                <select id="section_id">
                    <option value="">-- All Sections --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Academic Year *</label>
                <select id="academic_year" required></select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Effective From *</label>
                    <input type="date" id="effective_from" required>
                </div>
                <div class="form-group">
                    <label>Effective To</label>
                    <input type="date" id="effective_to">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeTimetableModal()">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="createTimetable()"><i class="fas fa-check"></i>
                Create</button>
        </div>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

        if (tab === 'periods') {
            document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
            document.getElementById('periodsTab').classList.add('active');
            document.getElementById('addPeriodBtn').style.display = 'inline-flex';
            document.getElementById('addTimetableBtn').style.display = 'none';
        } else {
            document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
            document.getElementById('timetablesTab').classList.add('active');
            document.getElementById('addPeriodBtn').style.display = 'none';
            document.getElementById('addTimetableBtn').style.display = 'inline-flex';
        }
    }

    function loadPeriods() {
        fetch('/timetable/periods/')
            .then(r => r.json())
            .then(data => {
                const periods = data.periods;
                let html = '';
                if (periods.length === 0) {
                    html = '<div class="empty-state"><i class="fas fa-clock"></i><p>No periods found. Click "Add Period" to create one.</p></div>';
                } else {
                    html = '<div class="table-header"><div>Period Name</div><div>Type</div><div>Start Time</div><div>End Time</div><div>Actions</div></div>';
                    periods.forEach(p => {
                        html += `<div class="table-row">
                        <div style="font-weight: 600; color: var(--text-color);">${p.PeriodName}</div>
                        <div>${p.PeriodType}</div>
                        <div>${p.StartTime.slice(0, 5)}</div>
                        <div>${p.EndTime.slice(0, 5)}</div>
                        <div class="table-actions">
                            <button class="action-btn edit-btn" onclick="editPeriod(${p.PeriodID})" title="Edit"><i class="fas fa-edit"></i></button>
                            <button class="action-btn delete-btn" onclick="deletePeriod(${p.PeriodID})" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
                    });
                }
                document.getElementById('periodsList').innerHTML = html;
            });
    }

    function loadTimetables() {
        fetch('/timetable/list/')
            .then(r => r.json())
            .then(data => {
                const timetables = data.timetables;
                let html = '';
                if (timetables.length === 0) {
                    html = '<div class="empty-state"><i class="fas fa-calendar-alt"></i><p>No timetables found. Click "Create Timetable" to create one.</p></div>';
                } else {
                    html = '<div class="table-header"><div>Class</div><div>Section</div><div>Academic Year</div><div>Effective From</div><div>Actions</div></div>';
                    timetables.forEach(t => {
                        html += `<div class="table-row">
                        <div style="font-weight: 600; color: var(--text-color);">${t.ClassName}</div>
                        <div>${t.SectionName || '-'}</div>
                        <div>${t.AcademicYear}</div>
                        <div>${new Date(t.EffectiveFrom).toLocaleDateString('en-GB')}</div>
                        <div class="table-actions">
                            <button class="action-btn edit-btn" onclick="window.location.href='/timetable/view/${t.EncryptedID}/'" title="View & Edit"><i class="fas fa-eye"></i></button>
                            <button class="action-btn delete-btn" onclick="event.stopPropagation(); deleteTimetable('${t.EncryptedID}')" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
                    });
                }
                document.getElementById('timetablesList').innerHTML = html;
            });
    }

    let periods = [];
    function openPeriodModal(periodId = null) {
        if (periodId) {
            fetch('/timetable/periods/').then(r => r.json()).then(data => {
                periods = data.periods;
                const period = periods.find(p => p.PeriodID === periodId);
                document.getElementById('periodModalTitle').textContent = 'Edit Period';
                document.getElementById('period_id').value = period.PeriodID;
                document.getElementById('period_name').value = period.PeriodName;
                document.getElementById('period_type').value = period.PeriodType;
                document.getElementById('start_time').value = period.StartTime.slice(0, 5);
                document.getElementById('end_time').value = period.EndTime.slice(0, 5);
                document.getElementById('display_order').value = period.DisplayOrder;
            });
        } else {
            document.getElementById('periodModalTitle').textContent = 'Add Period';
            document.getElementById('period_id').value = '';
            document.getElementById('period_name').value = '';
            document.getElementById('period_type').value = 'Class';
            document.getElementById('start_time').value = '';
            document.getElementById('end_time').value = '';
            document.getElementById('display_order').value = '';
        }
        document.getElementById('periodModal').classList.add('show');
    }

    function closePeriodModal() {
        document.getElementById('periodModal').classList.remove('show');
    }

    function savePeriod() {
        const data = {
            period_id: document.getElementById('period_id').value || null,
            period_name: document.getElementById('period_name').value,
            period_type: document.getElementById('period_type').value,
            start_time: document.getElementById('start_time').value,
            end_time: document.getElementById('end_time').value,
            display_order: document.getElementById('display_order').value
        };
        fetch('/timetable/period/save/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify(data)
        }).then(r => r.json()).then(data => {
            alert(data.message);
            closePeriodModal();
            loadPeriods();
        });
    }

    function editPeriod(id) { openPeriodModal(id); }

    function deletePeriod(id) {
        if (!confirm('Delete this period?')) return;
        fetch('/timetable/period/delete/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ period_id: id })
        }).then(r => r.json()).then(data => {
            alert(data.message);
            loadPeriods();
        });
    }

    function openTimetableModal() {
        document.getElementById('timetableModal').classList.add('show');
        fetch('/api/classes/').then(r => r.json()).then(data => {
            document.getElementById('class_id').innerHTML = '<option value="">-- Select --</option>' +
                data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        });
        fetch('/api/academic-years/').then(r => r.json()).then(data => {
            document.getElementById('academic_year').innerHTML = '<option value="">-- Select --</option>' +
                data.map(a => `<option value="${a.name}">${a.name}</option>`).join('');
        });
    }

    function closeTimetableModal() {
        document.getElementById('timetableModal').classList.remove('show');
    }

    function loadSections() {
        const classId = document.getElementById('class_id').value;
        if (!classId) return;
        fetch(`/api/sections/?class_id=${classId}`).then(r => r.json()).then(data => {
            if (data.status === 'SUCCESS' && data.sections) {
                document.getElementById('section_id').innerHTML = '<option value="">-- All Sections --</option>' +
                    data.sections.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            }
        });
    }

    function createTimetable() {
        const data = {
            class_id: document.getElementById('class_id').value,
            section_id: document.getElementById('section_id').value || null,
            academic_year: document.getElementById('academic_year').value,
            effective_from: document.getElementById('effective_from').value,
            effective_to: document.getElementById('effective_to').value || null
        };
        fetch('/timetable/create/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify(data)
        }).then(r => r.json()).then(data => {
            alert(data.message);
            if (data.success) {
                closeTimetableModal();
                loadTimetables();
            }
        });
    }

    function deleteTimetable(id) {
        if (!confirm('Delete this timetable?')) return;
        fetch('/timetable/delete/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ timetable_id: id })
        }).then(r => r.json()).then(data => {
            alert(data.message);
            loadTimetables();
        });
    }

    document.getElementById('periodModal').addEventListener('click', function (e) {
        if (e.target === this) closePeriodModal();
    });
    document.getElementById('timetableModal').addEventListener('click', function (e) {
        if (e.target === this) closeTimetableModal();
    });

    loadPeriods();
    loadTimetables();
</script>
{% endblock %}
