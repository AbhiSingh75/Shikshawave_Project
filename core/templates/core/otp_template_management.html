{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OTP Template Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2><i class="fas fa-envelope"></i> OTP Email Templates</h2>
        <div class="row mt-4">
            {% for template in templates %}
            <div class="col-md-4 mb-4">
                <div class="card {% if template.code == active_template %}border-success{% endif %}">
                    <div class="card-header {% if template.code == active_template %}bg-success text-white{% endif %}">
                        <h5 class="mb-0">{{ template.name }}
                            {% if template.code == active_template %}<span class = "badge bg-light text-success float-end">Active</span>{% endif %}
                        </h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-sm btn-outline-primary preview-btn" data-code="{{ template.code }}">
                            <i class="fas fa-eye"></i> Preview
                        </button>
                        {% if template.code != active_template %}
                        <button class="btn btn-sm btn-success activate-btn" data-code="{{ template.code }}">
                            <i class="fas fa-check"></i> Activate
                        </button>
                        {% endif %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="modal fade" id="previewModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Preview</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="previewContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.preview-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                fetch(`/otp-template/preview/${this.dataset.code}/`)
                    .then(r => r.json())
                    .then(data => {
                        if(data.success) {
                            document.getElementById('previewContent').innerHTML = data.html;
                            new bootstrap.Modal(document.getElementById('previewModal')).show();
                        }
                    });
            });
        });

        document.querySelectorAll('.activate-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if(confirm('Activate?')) {
                    fetch('/otp-template/activate/', {
                        method: 'POST',
                        headers: {'X-CSRFToken': '{{ csrf_token }}', 'Content-Type': 'application/x-www-form-urlencoded'},
                        body: `template_code=${this.dataset.code}`
                    })
                    .then(r => r.json())
                    .then(data => { if(data.success) location.reload(); });
                }
            });
        });
    </script>
</body>
</html>
