<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 20px">
<tr><td align="center">
<table width="550" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:10px;border:1px solid #e2e8f0">
<tr><td style="background:linear-gradient(90deg,#06b6d4,#0891b2);padding:25px;text-align:center">
<h1 style="margin:0;color:#fff;font-size:24px">{% if school_name %}{{ school_name }}{% else %}ShikshaWave{% endif %}</h1>
</td></tr>
<tr><td style="padding:40px 35px">
<p style="margin:0 0 20px;color:#333;font-size:16px">Hello {{ user_name }},</p>
<p style="margin:0 0 25px;color:#64748b;font-size:14px">Your verification code:</p>
<table width="100%" cellpadding="0" cellspacing="0">
<tr><td align="center">
<div style="background:#ecfeff;border:2px solid #06b6d4;border-radius:8px;padding:22px;display:inline-block">
<span style="font-size:38px;font-weight:bold;color:#0891b2;letter-spacing:8px;font-family:monospace">{{ otp }}</span>
</div>
</td></tr></table>
<p style="margin:25px 0 0;color:#64748b;font-size:13px;text-align:center">Valid for {{ valid_minutes }} minutes | IP: {{ ip_address }}</p>
</td></tr>
</table>
</td></tr></table>
</body></html>
