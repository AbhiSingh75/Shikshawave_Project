{% extends 'core/base_with_header.html' %}
{% load static %}

{% block title %}Generate Document{% endblock %}

{% block content %}
<div class="main-container" style="padding: 20px; background: var(--secondary-color); min-height: calc(100vh - 80px);">
    <!-- Page Header -->
    <div class="page-header" style="background: var(--secondary-color); border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border: 2px solid var(--primary-color); border-left: 4px solid var(--primary-color);">
        <div class="header-row" style="display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap;">
            <h1 class="page-title" style="font-size: 1.2rem; font-weight: 600; color: var(--text-color); margin: 0; display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
                <i class="fas fa-file-alt" style="font-size: 1.2rem; color: var(--primary-color);"></i>
                Generate Document
            </h1>
        </div>
    </div>
    
    <div style="background: var(--secondary-color); border-radius: 8px; padding: 24px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border: 1px solid var(--border-color);">
        <form method="post">
            {% csrf_token %}
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: var(--text-color); text-transform: uppercase; letter-spacing: 0.5px;">Select Student</label>
                <select name="student_id" style="width: 100%; padding: 12px 16px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; font-weight: 500; background: var(--secondary-color); color: var(--text-color);" required>
                    <option value="">-- Select Student --</option>
                    {% for student in students %}
                    <option value="{{ student.StudentID }}">{{ student.StudentName }} - {{ student.ClassName }} {{ student.SectionName }} (Roll: {{ student.RollNumber }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: var(--text-color); text-transform: uppercase; letter-spacing: 0.5px;">Document Type</label>
                <select name="document_type" style="width: 100%; padding: 12px 16px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; font-weight: 500; background: var(--card-bg); color: var(--text-color);" required>
                    <option value="">-- Select Document --</option>
                    {% for doc in document_types %}
                    <option value="{{ doc }}">{{ doc }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: var(--text-color); text-transform: uppercase; letter-spacing: 0.5px;">Remarks (Optional)</label>
                <textarea name="remarks" style="width: 100%; padding: 12px 16px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; font-weight: 500; background: var(--card-bg); color: var(--text-color);" rows="3" placeholder="Additional information for the certificate"></textarea>
            </div>
            
            <button type="submit" style="padding: 10px 16px; border: 2px solid var(--primary-color); border-radius: 8px; background: var(--primary-color); color: white; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;">
                <i class="fas fa-plus-circle"></i> Generate Document
            </button>
        </form>
    </div>
</div>
{% endblock %}
